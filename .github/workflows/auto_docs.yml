name: 🔄 Auto-Update Data Dictionary

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'S&OP_Dashboard.SemanticModel/definition/**'
      - 'scripts/generate_data_dictionary.py'
  pull_request:
    paths:
      - 'S&OP_Dashboard.SemanticModel/definition/**'
      - 'scripts/generate_data_dictionary.py'

permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: ⚙️ Generate Data Dictionary
      run: python scripts/generate_data_dictionary.py

    - name: 📤 Commit & Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add docs/data_dictionary.md
        if git diff --cached --quiet; then
          echo "No changes in data dictionary."
        else
          git commit -m "chore: auto-update data dictionary from TMDL schema [skip ci]"
          git push
        fi
