name: "💡 Feature Request"
description: Propose a new feature, metric, or layout for the dashboard.
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### Propose a Feature or Metric
        Have an idea for a new KPI, visualization, page, or data connection? Share your thoughts below!
  - type: textarea
    id: story
    attributes:
      label: "User Story / Business Need"
      description: "What operational or planning problem does this feature solve?"
      placeholder: "e.g., As an operations coordinator, I want to filter order fulfillment by primary supplier so I can compare supplier logistics performance."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Detail the proposed changes (e.g. measures, visualizations, drill-throughs)."
      placeholder: "e.g., Add a filter pane component for 'Primary Supplier' and a scatter plot comparing OTIF % vs average delivery delay."
    validations:
      required: true
  - type: dropdown
    id: data_source
    attributes:
      label: "Staging Data Availability"
      description: "Does the required data already exist in the staging dataset.xlsx?"
      options:
        - "Yes, the data is already present in dataset.xlsx"
        - "No, this requires adding new tables, columns, or sheets"
        - "Unsure / Need assistance mapping sources"
    validations:
      required: true
  - type: textarea
    id: alternative
    attributes:
      label: "Alternatives / Current Workarounds"
      description: "How are planners currently analyzing this information?"
  - type: textarea
    id: mockups
    attributes:
      label: "Additional Mockups / Context"
      description: "Insert DAX code ideas, mockup images, or reference links."
